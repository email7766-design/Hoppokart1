<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hoppokart | Products</title>
<link rel="preload" href="/fonts/inter.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link href="/fonts/inter.css" rel="stylesheet"></noscript>
<style>
  :root {
    --primary: #1b8354; --primary-dark: #116640; --accent: #f97316;
    --bg: #f4f8ef; --card: #ffffff; --text: #152018; --muted: #4a5c4b;
    --border: #d8e2d1; --shadow: 0 10px 30px rgba(21,32,24,0.08);
    --danger: #dc2626; --warning: #b45309; --success: #166534;
    --sidebar-bg: #152018; --sidebar-text: #e8f5e9; --sidebar-active: #1b8354;
  }
  * { box-sizing: border-box; }
  body { margin: 0; min-height: 100vh; font-family: "Inter",system-ui,sans-serif; color: var(--text); background: var(--bg); display: flex; }
  .hidden { display: none !important; }

  .sidebar { width: 260px; background: var(--sidebar-bg); color: var(--sidebar-text); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; overflow-y: auto; }
  .sidebar-brand { padding: 24px 20px; font-size: 1.3rem; font-weight: 800; border-bottom: 1px solid rgba(255,255,255,0.08); background: linear-gradient(135deg,#4ade80,#f97316); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .sidebar-nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 6px; }
  .sidebar-link { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: 12px; font-weight: 600; font-size: 0.95rem; color: rgba(255,255,255,0.7); transition: all 0.2s; text-decoration: none; }
  .sidebar-link:hover, .sidebar-link.active { background: rgba(255,255,255,0.06); color: #fff; }
  .sidebar-link.active { background: var(--sidebar-active); box-shadow: 0 4px 12px rgba(27,131,84,0.35); }
  .sidebar-icon { width: 22px; height: 22px; display: inline-flex; align-items: center; justify-content: center; font-size: 1.1rem; }
  .sidebar-footer { padding: 16px; border-top: 1px solid rgba(255,255,255,0.08); }
  .sidebar-footer button { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.15); background: transparent; color: rgba(255,255,255,0.8); font-weight: 600; cursor: pointer; }
  .sidebar-footer button:hover { background: rgba(255,255,255,0.08); color: #fff; }

  .main { flex: 1; margin-left: 260px; min-height: 100vh; display: flex; flex-direction: column; }
  .topbar { background: var(--card); border-bottom: 1px solid var(--border); padding: 16px 28px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
  .topbar h1 { font-size: 1.3rem; margin: 0; }
  .topbar-actions { display: flex; gap: 10px; align-items: center; }
  .mobile-menu-btn { display: none; padding: 8px; border-radius: 8px; border: 1px solid var(--border); background: #fff; color: var(--text); cursor: pointer; font-size: 0.9rem; }
  .mobile-menu-btn svg { width: 20px; height: 20px; }
  .topbar-btn { padding: 8px 16px; border-radius: 10px; border: 1px solid var(--border); background: #fff; font-weight: 600; font-size: 0.88rem; cursor: pointer; color: var(--text); }
  .topbar-btn.primary { background: linear-gradient(135deg,var(--primary),var(--primary-dark)); color: #fff; border-color: transparent; }

  .content { flex: 1; padding: 24px 28px; }
  .panel { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 22px; box-shadow: var(--shadow); margin-bottom: 20px; }

  .layout { display: grid; grid-template-columns: 1fr 420px; gap: 24px; align-items: start; }
  .sticky-panel { position: sticky; top: 90px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-grid .full { grid-column: 1 / -1; }
  label { display: block; font-size: 0.82rem; font-weight: 700; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.03em; }
  input, select, textarea { width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 12px; font: inherit; background: #f8fafc; transition: all 0.2s; }
  input:focus, select:focus, textarea:focus { border-color: var(--primary); background: #fff; outline: none; box-shadow: 0 0 0 3px rgba(27,131,84,0.1); }
  textarea { min-height: 80px; resize: vertical; }
  .save-btn { width: 100%; padding: 14px; border-radius: 12px; border: none; background: linear-gradient(135deg,var(--primary),var(--primary-dark)); color: #fff; font-weight: 700; cursor: pointer; margin-top: 14px; transition: transform 0.2s, box-shadow 0.2s; }
  .save-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(27,131,84,0.2); }

  .upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 14px; }
  .upload-card { padding: 16px 12px; border: 2px dashed var(--border); border-radius: 16px; background: #f8fafc; text-align: center; transition: all 0.2s; }
  .upload-card:hover { border-color: var(--primary); background: #f0fdf4; }
  .upload-card label { cursor: pointer; color: var(--primary); margin-bottom: 8px; }
  .upload-card input[type="file"] { font-size: 0.75rem; color: var(--muted); width: 100%; cursor: pointer; }
  .upload-card img { width: 100%; aspect-ratio: 1; object-fit: cover; background: #fff; border: 1px solid var(--border); border-radius: 10px; margin-top: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

  .product-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
  .product-item { display: flex; flex-direction: column; padding: 16px; border: 1px solid var(--border); border-radius: 20px; background: var(--card); transition: all 0.2s ease; }
  .product-item:hover { transform: translateY(-4px); box-shadow: 0 10px 30px rgba(21,32,24,0.12); border-color: var(--primary); }
  .product-item img { width: 100%; aspect-ratio: 1; object-fit: cover; background: #f8fafc; border-radius: 14px; margin-bottom: 14px; border: 1px solid var(--border); }
  .product-item .name { font-weight: 800; font-size: 1.05rem; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.3; }
  .product-item .meta { color: var(--primary-dark); font-weight: 800; font-size: 1.1rem; margin-bottom: 6px; }
  .product-item .category { color: var(--muted); font-size: 0.75rem; background: #f1f5f9; padding: 4px 10px; border-radius: 8px; align-self: flex-start; margin-bottom: 14px; font-weight: 600; text-transform: uppercase; }
  .product-actions { display: flex; gap: 8px; margin-top: auto; }
  .product-actions button { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--border); background: #fff; font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
  .product-actions button:hover { background: #f8fafc; border-color: var(--primary); color: var(--primary); }
  .product-actions button.danger { color: var(--danger); }
  .product-actions button.danger:hover { background: #fff1f2; border-color: #fecaca; }

  .empty-state { padding: 30px; text-align: center; color: var(--muted); }

  .message { margin: 8px 0 14px; padding: 12px 14px; border-radius: 12px; font-size: 0.92rem; display: none; }
  .message.show { display: block; }
  .message.error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
  .message.success { background: #ecfdf5; color: #166534; border: 1px solid #bbf7d0; }

  .auth-wrap { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at 15% 10%,#dcfce7 0,transparent 35%),radial-gradient(circle at 85% 90%,#fed7aa 0,transparent 35%),linear-gradient(135deg,var(--bg),#eff8ff); z-index: 200; }
  .auth-card { width: min(90%,420px); background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 32px; box-shadow: var(--shadow); }
  .auth-card .brand { font-size: 1.5rem; font-weight: 800; margin-bottom: 8px; background: linear-gradient(135deg,var(--primary),var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .auth-card input { width: 100%; min-height: 48px; padding: 12px 14px; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 14px; background: #fff; color: var(--text); }
  .auth-card button[type="submit"] { width: 100%; min-height: 48px; border-radius: 12px; border: none; background: linear-gradient(135deg,var(--primary),var(--primary-dark)); color: #fff; font-weight: 700; cursor: pointer; }

  @media (max-width: 1100px) { .layout { grid-template-columns: 1fr; } .sticky-panel { position: static; } }
  @media (max-width: 768px) { .sidebar { transform: translateX(-100%); transition: transform 0.3s ease; z-index: 1000; display: flex; } .sidebar.show { transform: translateX(0); } .main { margin-left: 0; } .mobile-menu-btn { display: flex; align-items: center; gap: 6px; } .topbar h1 { font-size: 1.1rem; } .content { padding: 16px; } .panel { padding: 16px; margin-bottom: 16px; } .form-grid { grid-template-columns: 1fr; } .product-list { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); } }
</style>
</head>
<body>

<div id="authView" class="auth-wrap">
  <div class="auth-card">
    <div class="brand">Hoppokart</div>
    <h2 style="margin-bottom:8px;">Admin Login</h2>
    <p style="color:var(--muted); margin-bottom:18px; font-size:0.92rem;">Store management access ke liye apna admin password enter kijiye.</p>
    <div id="message" class="message"></div>
    <form id="authForm">
      <input id="adminPassword" type="password" placeholder="Enter admin password" required>
      <button type="submit">Login</button>
    </form>
    <p style="margin-top:16px; text-align:center; font-size:0.85rem; color:var(--muted);"><a href="/index.html" style="color:var(--primary); font-weight:600;">Back to website</a></p>
  </div>
</div>

<div id="dashboardView" class="hidden" style="display:flex; width:100%;">
  <aside class="sidebar">
    <div class="sidebar-brand">Hoppokart</div>
    <nav class="sidebar-nav">
      <a href="/admin.html" class="sidebar-link"><span class="sidebar-icon">&#9638;</span>Dashboard</a>
      <a href="/admin-orders.html" class="sidebar-link"><span class="sidebar-icon">&#128203;</span>Orders</a>
      <a href="/admin-products.html" class="sidebar-link active"><span class="sidebar-icon">&#128230;</span>Products</a>
      <a href="/admin-store.html" class="sidebar-link"><span class="sidebar-icon">&#9881;</span>Store Controls</a>
      <a href="/admin-sales.html" class="sidebar-link"><span class="sidebar-icon">&#128200;</span>Sales Dashboard</a>
    </nav>
    <div class="sidebar-footer"><button id="logoutBtn" type="button">Logout</button></div>
  </aside>

  <!-- Mobile overlay -->
  <div class="mobile-overlay" id="mobileOverlay" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 999;"></div>

  <div class="main">
    <div class="topbar">
      <div style="display: flex; align-items: center; gap: 12px;">
        <button class="mobile-menu-btn" id="mobileMenuBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
          Menu
        </button>
        <h1>Products</h1>
      </div>
      <div class="topbar-actions">
        <a href="/index.html" class="topbar-btn">Open Website</a>
        <button id="refreshBtn" class="topbar-btn primary">Refresh</button>
      </div>
    </div>
    <div class="content">
      <div class="layout">
        <div>
          <div class="panel">
            <div id="productMessage" class="message"></div>
            <h3 style="margin-top:0; margin-bottom:16px;">Product List</h3>
            <div id="productList" class="product-list">
              <div class="empty-state">Loading products...</div>
            </div>
          </div>
        </div>
        <div>
          <div class="panel sticky-panel">
            <h3 style="margin-top:0; margin-bottom:16px;" id="formTitle">Add Product</h3>
            <div id="formMessage" class="message"></div>
            <form id="productForm">
              <div class="form-grid">
                <div class="full">
                  <label>Product Name</label>
                  <input id="pName" type="text" required placeholder="Product title">
                </div>
                <div>
                  <label>Price</label>
                  <input id="pPrice" type="text" required placeholder="399">
                </div>
                <div>
                  <label>Original Price (MRP)</label>
                  <input id="pOriginalPrice" type="text" placeholder="599">
                </div>
                <div>
                  <label>Category</label>
                  <select id="pCategory"><option value="">Select category</option></select>
                </div>
                <div class="full">
                  <label>Video URL</label>
                  <input id="pVideo" type="text" placeholder="YouTube / mp4 URL">
                </div>
              </div>
              <div class="upload-grid">
                <div class="upload-card">
                  <label>Image 1</label>
                  <input id="img1File" type="file" accept="image/*">
                  <img id="img1Preview" class="hidden" alt="Preview">
                </div>
                <div class="upload-card">
                  <label>Image 2</label>
                  <input id="img2File" type="file" accept="image/*">
                  <img id="img2Preview" class="hidden" alt="Preview">
                </div>
                <div class="upload-card">
                  <label>Image 3</label>
                  <input id="img3File" type="file" accept="image/*">
                  <img id="img3Preview" class="hidden" alt="Preview">
                </div>
                <div class="upload-card">
                  <label>Image 4</label>
                  <input id="img4File" type="file" accept="image/*">
                  <img id="img4Preview" class="hidden" alt="Preview">
                </div>
              </div>
              <button type="submit" class="save-btn" id="saveBtn">Save Product</button>
              <button type="button" class="save-btn" style="background:#f8fafc; color:var(--text); border:1px solid var(--border); margin-top:8px;" onclick="clearForm()">Clear Form</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
  </div>

<script>
const API_BASE = window.location.protocol === 'file:' ? 'http://localhost:3000' : '';
const apiUrl = (path) => (API_BASE ? API_BASE + path : path);
const SESSION_KEY_KEY = 'admin_session_key';
const FALLBACK = '/favicon.png';

function getSessionKey() {
  return sessionStorage.getItem(SESSION_KEY_KEY);
}

function setSessionKey(key) {
  sessionStorage.setItem(SESSION_KEY_KEY, key);
}

function clearSessionKey() { sessionStorage.removeItem(SESSION_KEY_KEY); }

function clearLegacyLocalStorageSession() {
  try { localStorage.removeItem(SESSION_KEY_KEY); } catch (err) { /* ignore */ }
}

function shouldResetSessionForCurrentEntry() {
  const ref = document.referrer || '';
  return ref && !ref.includes('/admin');
}

function showMsg(el, text, type) { el.textContent = text; el.className = `message show ${type}`; }
function clearMsg(el) { el.className = 'message'; el.textContent = ''; }

async function apiFetch(path, opts = {}) {
  const sessionKey = getSessionKey();
  if (sessionKey) {
    opts.headers = {
      ...opts.headers,
      'X-Admin-Session': sessionKey
    };
  }
  const res = await fetch(apiUrl(path), opts);
  if (res.status === 401) {
    clearSessionKey();
    location.reload();
    throw new Error('Unauthorized');
  }
  const data = await res.json().catch(() => ({}));
  if (!res.ok || data.success === false) throw new Error(data.message || 'Request failed');
  return data;
}

async function fileToDataUrl(file) {
  return new Promise((resolve, reject) => { const r = new FileReader(); r.onload = () => resolve(r.result); r.onerror = reject; r.readAsDataURL(file); });
}

let editingId = '';
let draftImages = { img1: '', img2: '', img3: '', img4: '' };

function bindUploads() {
  [1,2,3,4].forEach(i => {
    const input = document.getElementById(`img${i}File`);
    const preview = document.getElementById(`img${i}Preview`);
    input.addEventListener('change', async () => {
      const file = input.files[0];
      if (!file) { draftImages[`img${i}`] = ''; preview.classList.add('hidden'); return; }
      const url = await fileToDataUrl(file);
      draftImages[`img${i}`] = url;
      preview.src = url; preview.classList.remove('hidden');
    });
  });
}

function clearForm() {
  editingId = '';
  document.getElementById('formTitle').textContent = 'Add Product';
  document.getElementById('saveBtn').textContent = 'Save Product';
  document.getElementById('pName').value = '';
  document.getElementById('pPrice').value = '';
  document.getElementById('pOriginalPrice').value = '';
  document.getElementById('pCategory').value = '';
  document.getElementById('pVideo').value = '';
  [1,2,3,4].forEach(i => {
    document.getElementById(`img${i}File`).value = '';
    document.getElementById(`img${i}Preview`).classList.add('hidden');
    draftImages[`img${i}`] = '';
  });
  clearMsg(document.getElementById('formMessage'));
}

async function loadCategories() {
  const data = await apiFetch('/api/categories');
  const sel = document.getElementById('pCategory');
  const categories = data.categories || [];
  sel.innerHTML = '<option value="">Select category</option>' + categories.map(c => {
    const name = typeof c === 'string' ? c : c.name || '';
    return `<option value="${name}">${name}</option>`;
  }).join('');
}

async function loadProducts() {
  const data = await apiFetch('/api/products');
  const list = document.getElementById('productList');
  const products = data.products || [];
  if (!products.length) { list.innerHTML = '<div class="empty-state">No products yet.</div>'; return; }
  list.innerHTML = products.map(p => {
    const img = p.img1 || FALLBACK;
    return `<div class="product-item">
      <img src="${img}" onerror="this.src='${FALLBACK}'" alt="">
      <div class="name">${p.name}</div>
      <div class="meta">Rs ${p.price}</div>
      <div class="category">${p.category || 'General'}</div>
      <div class="product-actions">
        <button onclick="editProduct('${p._id}')">Edit</button>
        <button class="danger" onclick="deleteProduct('${p._id}')">Delete</button>
      </div>
    </div>`;
  }).join('');
}

async function editProduct(id) {
  const data = await apiFetch('/api/products');
  const p = (data.products || []).find(x => x._id === id);
  if (!p) return;
  editingId = id;
  document.getElementById('formTitle').textContent = 'Edit Product';
  document.getElementById('saveBtn').textContent = 'Update Product';
  document.getElementById('pName').value = p.name || '';
  document.getElementById('pPrice').value = p.price || '';
  document.getElementById('pOriginalPrice').value = p.originalPrice || '';
  document.getElementById('pCategory').value = p.category || '';
  document.getElementById('pVideo').value = p.video || '';
  [1,2,3,4].forEach(i => {
    const url = p[`img${i}`] || '';
    draftImages[`img${i}`] = url;
    const preview = document.getElementById(`img${i}Preview`);
    if (url) { preview.src = url; preview.classList.remove('hidden'); }
    else { preview.classList.add('hidden'); }
    document.getElementById(`img${i}File`).value = '';
  });
}

async function deleteProduct(id) {
  if (!confirm('Delete this product?')) return;
  try {
    await apiFetch(`/api/products/${encodeURIComponent(id)}`, { method: 'DELETE' });
    if (editingId === id) clearForm();
    await loadProducts();
    showMsg(document.getElementById('productMessage'), 'Product deleted', 'success');
  } catch (err) {
    showMsg(document.getElementById('productMessage'), err.message, 'error');
  }
}

document.getElementById('productForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  clearMsg(document.getElementById('formMessage'));
  const product = {
    name: document.getElementById('pName').value.trim(),
    price: document.getElementById('pPrice').value.trim(),
    originalPrice: document.getElementById('pOriginalPrice').value.trim(),
    category: document.getElementById('pCategory').value || 'General',
    video: document.getElementById('pVideo').value.trim(),
    img1: draftImages.img1, img2: draftImages.img2, img3: draftImages.img3, img4: draftImages.img4
  };
  if (!product.name || !product.price) { showMsg(document.getElementById('formMessage'), 'Name and price required', 'error'); return; }
  if (!product.img1) { showMsg(document.getElementById('formMessage'), 'At least Image 1 required', 'error'); return; }
  try {
    const path = editingId ? `/api/products/${encodeURIComponent(editingId)}` : '/api/products';
    const method = editingId ? 'PUT' : 'POST';
    await apiFetch(path, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(product) });
    clearForm();
    await loadProducts();
    showMsg(document.getElementById('productMessage'), editingId ? 'Product updated' : 'Product added', 'success');
  } catch (err) {
    showMsg(document.getElementById('formMessage'), err.message, 'error');
  }
});

document.getElementById('authForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  try {
    const response = await apiFetch('/api/admin/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: document.getElementById('adminPassword').value }) });
    setSessionKey(response.sessionKey);
    document.getElementById('authView').classList.add('hidden');
    document.getElementById('dashboardView').classList.remove('hidden');
    await loadCategories();
    await loadProducts();
  } catch (err) { showMsg(document.getElementById('message'), err.message || 'Login failed', 'error'); }
});

document.getElementById('logoutBtn').addEventListener('click', async () => {
  try {
    await apiFetch('/api/admin/logout-all', { method: 'POST' });
  } catch (err) {
    console.error("Logout failed:", err);
  } finally {
    clearSessionKey();
    location.reload();
  }
});
document.getElementById('refreshBtn').addEventListener('click', () => { loadProducts(); loadCategories(); });

bindUploads();

// Mobile menu functionality
const mobileMenuBtn = document.getElementById('mobileMenuBtn');
const mobileOverlay = document.getElementById('mobileOverlay');
const sidebar = document.querySelector('.sidebar');
if (mobileMenuBtn && mobileOverlay && sidebar) {
  mobileMenuBtn.addEventListener('click', () => { sidebar.classList.add('show'); mobileOverlay.style.display = 'block'; });
  mobileOverlay.addEventListener('click', () => { sidebar.classList.remove('show'); mobileOverlay.style.display = 'none'; });
  sidebar.addEventListener('click', (e) => { if (e.target.classList.contains('sidebar-link')) { sidebar.classList.remove('show'); mobileOverlay.style.display = 'none'; } });
}

async function checkAuthOnLoad() {
  clearLegacyLocalStorageSession();
  if (shouldResetSessionForCurrentEntry()) clearSessionKey();
  const sessionKey = getSessionKey();
  if (sessionKey) {
    try {
      const response = await apiFetch('/api/admin/check-session');
      if (response.success) {
        document.getElementById('authView').classList.add('hidden');
        document.getElementById('dashboardView').classList.remove('hidden');
        await loadCategories();
        await loadProducts();
      } else {
        clearSessionKey();
      }
    } catch (err) {
      clearSessionKey();
    }
  }
}
checkAuthOnLoad();
</script>
</body>
</html>
