<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Order | Hoppokart</title>
<link rel="preload" href="/fonts/inter.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link href="/fonts/inter.css" rel="stylesheet"></noscript>
<style>
  :root {
    --primary: #10b981;
    --primary-dark: #059669;
    --bg: #f9fafb;
    --card: #ffffff;
    --text: #111827;
    --muted: #6b7280;
    --border: #f3f4f6;
    --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    --radius: 20px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; padding-bottom: 40px; }
  .wrap { max-width: 700px; margin: 0 auto; padding: 0 16px; }

  header { padding: 24px 0; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); text-decoration: none; }
  .btn-back { font-size: 0.9rem; font-weight: 600; color: var(--muted); text-decoration: none; display: flex; align-items: center; gap: 5px; }

  .card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); padding: 32px; margin-bottom: 24px; }

  .status-header { text-align: center; margin-bottom: 40px; }
  .status-header h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 8px; }
  .order-id { font-family: monospace; background: #f3f4f6; padding: 4px 10px; border-radius: 6px; color: var(--muted); font-size: 0.9rem; }

  /* Stepper Logic */
  .stepper { display: flex; justify-content: space-between; position: relative; margin-bottom: 40px; padding: 0 10px; }
  .stepper::before { content: ''; position: absolute; top: 15px; left: 0; right: 0; height: 3px; background: #e5e7eb; z-index: 1; }
  .step-progress { position: absolute; top: 15px; left: 0; height: 3px; background: var(--primary); z-index: 2; transition: width 0.5s ease; width: 0%; }
  
  .step { position: relative; z-index: 3; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .step-circle { width: 32px; height: 32px; background: #fff; border: 3px solid #e5e7eb; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
  .step.active .step-circle { border-color: var(--primary); color: var(--primary); }
  .step.completed .step-circle { background: var(--primary); border-color: var(--primary); color: #fff; }
  .step-label { font-size: 0.75rem; font-weight: 700; color: var(--muted); text-transform: uppercase; }
  .step.active .step-label { color: var(--text); }

  .timeline { margin-top: 20px; border-left: 2px solid var(--border); margin-left: 10px; padding-left: 24px; }
  .timeline-item { position: relative; margin-bottom: 24px; }
  .timeline-item::before { content: ''; position: absolute; left: -31px; top: 4px; width: 12px; height: 12px; border-radius: 50%; background: var(--border); border: 3px solid #fff; }
  .timeline-item.latest::before { background: var(--primary); box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.2); }
  .timeline-date { font-size: 0.75rem; font-weight: 700; color: var(--muted); margin-bottom: 4px; }
  .timeline-content h4 { font-size: 0.95rem; font-weight: 700; margin-bottom: 2px; }
  .timeline-content p { font-size: 0.85rem; color: var(--muted); }

  .summary-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .item-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 0.95rem; }
  .item-row:last-child { border-bottom: none; }
  .total-row { display: flex; justify-content: space-between; padding-top: 16px; margin-top: 16px; border-top: 2px solid var(--border); font-weight: 800; font-size: 1.2rem; }

  .whatsapp-btn { display: flex; align-items: center; justify-content: center; gap: 10px; background: #25d366; color: #fff; padding: 16px; border-radius: 12px; font-weight: 700; text-decoration: none; margin-top: 20px; transition: transform 0.2s; }
  .whatsapp-btn:hover { transform: translateY(-2px); opacity: 0.9; }

  .error-state { text-align: center; padding: 60px 20px; }
  .error-state svg { color: #f87171; margin-bottom: 16px; }
  
  @media (max-width: 480px) {
    .card { padding: 20px; }
    .step-label { display: none; }
  }
</style>
</head>
<body>

  <div class="wrap">
    <header>
      <a href="/" class="logo">Hoppokart</a>
      <a href="/" class="btn-back">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to Shop
      </a>
    </header>

    <div id="mainContent">
      <div class="card" style="text-align: center; padding: 60px 0;">
        <p>Fetching order details...</p>
      </div>
    </div>
  </div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const orderId = urlParams.get('id');

  async function fetchOrder() {
    const container = document.getElementById('mainContent');
    
    if (!orderId) {
      renderError("Order ID missing. Please check your link.");
      return;
    }

    try {
      const res = await fetch(`/api/track/order/${encodeURIComponent(orderId)}`);
      const data = await res.json();

      if (!data.success) {
        renderError(data.message || "Order not found.");
        return;
      }

      renderOrder(data.order);
    } catch (err) {
      renderError("Network error. Please try again.");
    }
  }

  function renderError(msg) {
    document.getElementById('mainContent').innerHTML = `
      <div class="card error-state">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <h2>Oops!</h2>
        <p style="color: var(--muted); margin-top: 10px;">${msg}</p>
        <a href="/" class="btn-back" style="justify-content: center; margin-top: 20px;">Return Home</a>
      </div>
    `;
  }

  function getStepConfig(status) {
    const s = String(status).toLowerCase();
    if (s === 'delivered') return { progress: '100%', steps: [1,1,1,1] };
    if (s === 'shipped') return { progress: '66%', steps: [1,1,1,0] };
    if (s === 'paid' || s === 'confirmed' || s === 'processing') return { progress: '33%', steps: [1,1,0,0] };
    return { progress: '0%', steps: [1,0,0,0] }; // Created or pending
  }

  function renderOrder(order) {
    const stepConfig = getStepConfig(order.status);
    const timelineHtml = (order.timeline || []).reverse().map((t, idx) => `
      <div class="timeline-item ${idx === 0 ? 'latest' : ''}">
        <div class="timeline-date">${new Date(t.timestamp).toLocaleString()}</div>
        <div class="timeline-content">
          <h4>${t.status.toUpperCase()}</h4>
          <p>${t.note || 'Status updated'}</p>
        </div>
      </div>
    `).join('');

    const itemsHtml = (order.items || []).map(it => `
      <div class="item-row">
        <span>${it.name} <small style="color:var(--muted)">x${it.quantity}</small></span>
        <span>₹${it.price * it.quantity}</span>
      </div>
    `).join('');

    document.getElementById('mainContent').innerHTML = `
      <div class="status-header">
        <div style="margin-bottom: 10px;">
          <span style="background: ${order.status === 'delivered' ? '#d1fae5' : '#fef3c7'}; color: ${order.status === 'delivered' ? '#065f46' : '#92400e'}; padding: 6px 14px; border-radius: 99px; font-size: 0.85rem; font-weight: 800;">
            ${order.status.toUpperCase()}
          </span>
        </div>
        <h1>Order is ${order.status === 'delivered' ? 'Delivered!' : 'on its way'}</h1>
        <span class="order-id">ID: ${order.id}</span>
      </div>

      <div class="card">
        <div class="stepper">
          <div class="step-progress" style="width: ${stepConfig.progress}"></div>
          <div class="step ${stepConfig.steps[0] ? 'completed' : ''}">
            <div class="step-circle">${stepConfig.steps[0] ? '✓' : '1'}</div>
            <span class="step-label">Placed</span>
          </div>
          <div class="step ${stepConfig.steps[1] ? (stepConfig.steps[2] ? 'completed' : 'active') : ''}">
            <div class="step-circle">${stepConfig.steps[2] ? '✓' : '2'}</div>
            <span class="step-label">Confirmed</span>
          </div>
          <div class="step ${stepConfig.steps[2] ? (stepConfig.steps[3] ? 'completed' : 'active') : ''}">
            <div class="step-circle">${stepConfig.steps[3] ? '✓' : '3'}</div>
            <span class="step-label">Shipped</span>
          </div>
          <div class="step ${stepConfig.steps[3] ? 'completed' : ''}">
            <div class="step-circle">${stepConfig.steps[3] ? '✓' : '4'}</div>
            <span class="step-label">Delivered</span>
          </div>
        </div>

        <div class="timeline">
          ${timelineHtml}
        </div>
      </div>

      <div class="card">
        <h3 class="summary-title">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          Order Summary
        </h3>
        <div class="items-list">
          ${itemsHtml}
        </div>
        <div class="total-row">
          <span>Total Amount</span>
          <span>₹${order.totalAmount}</span>
        </div>
      </div>

      <div class="card" style="padding: 24px;">
        <div style="display: flex; gap: 15px; align-items: center; margin-bottom: 15px;">
          <div style="width: 48px; height: 48px; background: #eff6ff; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #3b82f6;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          </div>
          <div>
            <h4 style="font-size: 0.95rem; font-weight: 700;">Delivery Address</h4>
            <p style="font-size: 0.85rem; color: var(--muted);">${order.customerName}</p>
          </div>
        </div>
        <p style="font-size: 0.9rem; color: #4b5563; padding-left: 63px;">Your items will be delivered to the address provided during checkout.</p>
      </div>

      ${order.whatsappUrl ? `
        <a href="${order.whatsappUrl}" target="_blank" class="whatsapp-btn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
          Need Help? Chat on WhatsApp
        </a>
      ` : ''}
    `;
  }

  fetchOrder();
</script>
</body>
</html>
