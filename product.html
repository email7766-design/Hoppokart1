<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hoppokart | Product</title>

<!-- SEO Meta Tags -->
<meta name="description" content="Buy high quality products at best prices on Hoppokart.">

<!-- Social Media SEO (Open Graph) -->
<meta property="og:type" content="product">
<meta property="og:title" content="Hoppokart | Premium Product Detail">
<meta property="og:description" content="Check out this amazing product on Hoppokart. Best price guaranteed!">
<meta property="og:image" content="favicon.png">

<!-- Favicon -->
<link rel="icon" type="image/png" href="favicon.png">

<link rel="preload" href="/fonts/inter.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link href="/fonts/inter.css" rel="stylesheet"></noscript>
<link rel="stylesheet" href="/product.css">

<style>
  :root {
    --primary: #6366f1;
    --primary-dark: #4f46e5;
    --primary-light: #f5f3ff;
    --text-dark: #0f172a;
    --text-muted: #475569;
    --bg-light: #f8fafc;
    --card-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
    --radius: 20px;
  }

  body {
    background-color: var(--bg-light);
    color: var(--text-dark);
    font-family: 'Inter', -apple-system, sans-serif;
  }

  .wrap { max-width: 1200px; margin: 0 auto; padding: 0 15px; }

  .header {
    background: white;
    border-bottom: 1px solid #e2e8f0;
    padding: 15px 0;
    margin-bottom: 30px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  /* Modern Card Layout */
  .layout {
    display: grid;
    grid-template-columns: 1.1fr 0.9fr;
    gap: 40px;
    background: white;
    padding: 30px;
    border-radius: var(--radius);
    box-shadow: var(--card-shadow);
    margin-bottom: 40px;
  }

  @media (max-width: 991px) {
    .layout { grid-template-columns: 1fr; gap: 30px; padding: 20px; }
  }

  /* Gallery Improvements */
  .gallery-main {
    background: #f1f5f9;
    border-radius: 16px;
    overflow: hidden;
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .gallery-main img { width: 100%; height: 100%; object-fit: contain; }

  .gallery-thumb {
    border: 2px solid #e2e8f0;
    border-radius: 10px;
    transition: all 0.3s ease;
  }

  .gallery-thumb.active { border-color: var(--primary); transform: scale(1.05); }

  /* Info Section */
  .product-heading h1 { font-size: 2.2rem; font-weight: 800; margin: 10px 0; color: #0f172a; }
  .pill { background: var(--primary-light); color: var(--primary); border: none; padding: 6px 14px; }
  
  .price-block {
    background: #f8fafc;
    padding: 20px;
    border-radius: 16px;
    margin: 25px 0;
    border-left: 4px solid var(--primary);
  }

  .current-price { font-size: 2.5rem; color: var(--primary-dark); font-weight: 900; }
  .original-price { text-decoration: line-through; color: var(--text-muted); margin-left: 10px; }
  .discount-badge { background: #ef4444; color: white; padding: 4px 10px; border-radius: 6px; font-weight: 700; margin-left: 10px; }

  .qty-selector {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 25px;
    background: #f1f5f9;
    width: fit-content;
    padding: 8px 15px;
    border-radius: 12px;
  }

  .qty-btn { background: white; border: 1px solid #e2e8f0; width: 35px; height: 35px; border-radius: 8px; font-weight: bold; cursor: pointer; }
  .qty-input { background: transparent; border: none; width: 40px; text-align: center; font-size: 1.1rem; font-weight: 700; }

  .btn-primary {
    background: var(--primary);
    padding: 16px 32px;
    font-size: 1rem;
    font-weight: 700;
    border-radius: 12px;
    box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
  }

  .btn-secondary {
    border: 1px solid #e2e8f0;
    color: var(--text-dark);
    background: #f1f5f9;
    padding: 16px 32px;
    border-radius: 12px;
  }

  .feature-list {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="header-row">
        <a class="back-link" href="/index.html">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Home
        </a>
        <div class="brand">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary)">
            <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/>
          </svg>
          Hoppokart
        </div>
        <a class="back-link" href="/track.html">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 8 8 12 12 16"/><line x1="16" y1="12" x2="8" y2="12"/></svg>
          Track Order
        </a>
      </div>
    </div>

    <div id="productMount"></div>

    <!-- Chhota Side Cart Card -->
    <div class="added-card" id="addedCard">
      <div class="added-card-content">
        <img id="addedCardImg" src="" alt="">
        <div class="added-card-info">
          <p class="added-card-title" id="addedCardTitle">Product Name</p>
          <p class="added-card-status">Added to Cart!</p>
        </div>
      </div>
      <a href="/checkout.html?cart=1" class="btn btn-primary" style="width: 100%; min-height: 40px; font-size: 0.9rem;">Checkout Now</a>
    </div>

    <!-- Floating Gol Cart Button -->
    <a href="/checkout.html?cart=1" class="floating-cart" id="floatingCart">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="21" r="1"/>
        <circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
      </svg>
      <span class="badge" id="floatingBadge">0</span>
    </a>

    <section class="related">
      <h2>You may also like</h2>
      <div class="related-grid" id="relatedGrid"></div>
    </section>

    <div class="footer">
      <div class="footer-row">
        <a href="/index.html">Back to products</a>
        <a href="/track.html">Track Order</a>
        <a href="/admin.html">Admin Login</a>
        <div>Hoppokart product preview</div>
      </div>
    </div>
  </div>

  <!-- Product Reviews Section -->
  <section class="product-reviews">
    <div class="wrap">
      <h2>Customer Reviews</h2>
      <div class="overall-rating">
        <div class="rating-summary">
          <span class="average-rating" id="overallRatingValue"></span>
          <div class="stars" id="overallRatingStars">
            <!-- Stars will be dynamically generated here -->
          </div>
          <span class="total-reviews" id="overallReviewCount"></span>
        </div>
        <button class="btn btn-secondary write-review-btn" id="writeReviewBtn">Write a Review</button>
      </div>

      <div class="review-list" id="reviewList">
        <!-- Individual reviews will be dynamically generated here -->
      </div>

      <div class="review-form hidden" id="reviewForm">
        <h3>Share Your Experience</h3>
        <form id="submitReviewForm">
          <div class="form-group">
            <label for="reviewerName">Your Name</label>
            <input type="text" id="reviewerName" required placeholder="Enter your name">
          </div>
          <div class="form-group">
            <label for="reviewRating">Overall Rating</label>
            <div class="star-rating-input">
              <input type="radio" id="star5" name="rating" value="5" /><label for="star5" title="5 stars"></label>
              <input type="radio" id="star4" name="rating" value="4" /><label for="star4" title="4 stars"></label>
              <input type="radio" id="star3" name="rating" value="3" /><label for="star3" title="3 stars"></label>
              <input type="radio" id="star2" name="rating" value="2" /><label for="star2" title="2 stars"></label>
              <input type="radio" id="star1" name="rating" value="1" /><label for="star1" title="1 star"></label>
            </div>
          </div>
          <div class="form-group">
            <label for="reviewTitle">Review Title</label>
            <input type="text" id="reviewTitle" required placeholder="Summarize your experience">
          </div>
          <div class="form-group">
            <label for="reviewText">Your Review</label>
            <textarea id="reviewText" rows="5" required placeholder="Tell us more about your experience with the product"></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Submit Review</button>
        </form>
      </div>
    </div>
  </section>


  <!-- Lightbox HTML -->
  <div class="lightbox-overlay" id="lightboxOverlay">
    <button class="lightbox-close" id="lightboxClose">&times;</button>
    <div class="lightbox-content">
      <button class="lightbox-nav prev" id="lightboxPrev">&#10094;</button>
      <img class="lightbox-image" id="lightboxImage" src="" alt="Product Image">
      <button class="lightbox-nav next" id="lightboxNext">&#10095;</button>
    </div>
    <div class="gallery-thumbs" id="lightboxThumbs" style="position: absolute; bottom: 20px; padding: 0 20px; background: rgba(0,0,0,0.5); border-radius: var(--radius); max-width: 80%;">
      <!-- Thumbnails will be dynamically loaded here -->
    </div>
  </div>


<script>
  const params = new URLSearchParams(window.location.search);
  const productId = params.get('id');
  let activeProduct = null; // To store current product for Cart
  const productMount = document.getElementById('productMount');
  const relatedGrid = document.getElementById('relatedGrid');
  const FALLBACK_IMAGE = '/favicon.png';

  // Lightbox elements
  const lightboxOverlay = document.getElementById('lightboxOverlay');
  const lightboxImage = document.getElementById('lightboxImage');
  const lightboxPrev = document.getElementById('lightboxPrev');
  const lightboxNext = document.getElementById('lightboxNext');
  const lightboxThumbsContainer = document.getElementById('lightboxThumbs');

  // Review elements
  const overallRatingValueEl = document.getElementById('overallRatingValue');
  const overallRatingStarsEl = document.getElementById('overallRatingStars');
  const overallReviewCountEl = document.getElementById('overallReviewCount');

  function formatInr(value) {
    const numeric = Number(String(value || '').replace(/,/g, '').match(/\d+(\.\d+)?/)?.[0] || 0);
    return 'Rs ' + numeric.toLocaleString('en-IN');
  }

  function escapeHtml(value) {
    return String(value || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function getYoutubeId(url) {
    try {
      const parsed = new URL(String(url || '').trim());
      if (parsed.hostname.includes('youtu.be')) {
        return parsed.pathname.replace(/^\/+/, '').split('/')[0] || '';
      }
      if (parsed.hostname.includes('youtube.com')) {
        if (parsed.pathname.startsWith('/shorts/')) {
          return parsed.pathname.split('/')[2] || '';
        }
        return parsed.searchParams.get('v') || '';
      }
    } catch (_e) {}
    return '';
  }

  const API_BASE = window.location.protocol === 'file:' ? 'http://localhost:3000' : '';
  const apiUrl = (path) => (API_BASE ? API_BASE + path : path);
  const IS_FILE_PROTOCOL = window.location.protocol === 'file:';
  const LOCAL_PRODUCTS_PATH = 'database/products.json';

  async function safeFetchJson(primaryUrl, fallbackUrl) {
    try {
      const res = await fetch(primaryUrl, { cache: 'no-cache' });
      if (!res.ok) throw new Error('Fetch failed');
      return await res.json();
    } catch (_e) {
      if (!IS_FILE_PROTOCOL || !fallbackUrl) return null;
      try {
        const res = await fetch(fallbackUrl, { cache: 'no-cache' });
        if (!res.ok) throw new Error('Fallback fetch failed');
        return await res.json();
      } catch (_err) {
        return null;
      }
    }
  }

  async function getProducts() {
    const data = await safeFetchJson(apiUrl('/api/products'), LOCAL_PRODUCTS_PATH);
    if (!data) return [];
    if (Array.isArray(data.products)) return data.products;
    if (Array.isArray(data)) return data;
    return [];
  }

  function renderProduct(product) {
    document.title = `${product.name || 'Product'} | Hoppokart`;
    const images = [product.img1, product.img2, product.img3, product.img4].map(v=>String(v||'').trim()).filter(Boolean);
    const image = images[0] || FALLBACK_IMAGE;
    const videoMarkup = (function(){
      const safeUrl = String(product.video || product.videoUrl || product.vid || '').trim();
      const youtubeId = getYoutubeId(safeUrl);
      if (youtubeId) return `<div class="product-video"><h3>Product in Action</h3><iframe class="video-frame" src="https://www.youtube.com/embed/${youtubeId}?rel=0" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe></div>`;
      if (/\.(mp4|webm|ogg)(\?.*)?$/i.test(safeUrl)) return `<div class="product-video"><h3>Product Video</h3><video class="video-player" controls autoplay muted loop playsinline><source src="${safeUrl}"></video></div>`;
      return '';
    })();
    const name = escapeHtml(product.name || 'Untitled product');
    const category = escapeHtml(product.category || 'General');
    const price = formatInr(product.price);
    const originalPriceRaw = Number(product.originalPrice) || 0;
    const currentPriceRaw = Number(String(product.price || '').replace(/[^0-9.]/g, '')) || 0;

    const ratingValue = (4.0 + (name.charCodeAt(0) % 10) / 10).toFixed(1);
    const reviewCountVal = (name.charCodeAt(0) * 13) % 1200 + 150;

    const thumbsMarkup = (images.length ? images : [FALLBACK_IMAGE]).map((img, index) => `
      <button class="gallery-thumb ${index === 0 ? 'active' : ''}" type="button" data-gallery-image="${img}">
        <img src="${img}" alt="${name} image ${index + 1}" onerror="this.src='${FALLBACK_IMAGE}'">
      </button>
    `).join('');

    productMount.innerHTML = `
      <section class="layout">
        <div class="panel gallery">
          <div class="gallery-main">
            <img id="mainProductImage" src="${image}" alt="${name}" onerror="this.src='${FALLBACK_IMAGE}'">
          </div>
          <div class="gallery-thumbs">${thumbsMarkup}</div>
          ${videoMarkup}
        </div>
        <div class="panel info">
          <div class="info">
            <div class="product-heading">
              <div class="pill-row">
                <div class="pill">${category}</div>
                <div class="meta-pill">Best Seller</div>
              </div>
              <h1>${name}</h1>
              <div class="product-meta">
                <div class="rating">${ratingValue} <span class="rating-stars">★</span></div>
                <span class="meta-pill">Free Delivery</span>
                <span class="meta-pill">7 Day Return</span>
              </div>
            </div>
            <div class="price-block">
              <span class="current-price">${price}</span> <br>
              ${originalPriceRaw > currentPriceRaw ? `<span class="original-price">MRP: ${formatInr(originalPriceRaw)}</span><span class="discount-badge">${Math.round(((originalPriceRaw - currentPriceRaw) / originalPriceRaw) * 100)}% OFF</span>` : ''}
            </div>
            <div class="info-note">Delivered by Hoppokart with secure payment, fast shipping, and easy replacement.</div>
            <div class="feature-list">
              <div class="feature-item"><span>Delivery</span><span>2-4 days</span></div>
              <div class="feature-item"><span>Warranty</span><span>6 months</span></div>
              <div class="feature-item"><span>Seller</span><span>Trusted seller</span></div>
            </div>
            <p class="product-desc">${escapeHtml(product.description || product.subtitle || product.summary || 'High-quality product with fast delivery and satisfaction guarantee.')}</p>
            <div class="qty-selector">
              <label>Quantity:</label>
              <button class="qty-btn" type="button" onclick="changeQty(-1)">-</button>
              <input type="number" id="buyQty" value="1" min="1" class="qty-input">
              <button class="qty-btn" type="button" onclick="changeQty(1)">+</button>
            </div>
            <div class="action-row">
              <button class="btn btn-primary" type="button" onclick="buyNow('${encodeURIComponent(product._id||'')}')">Buy Now</button>
              <button class="btn btn-secondary" type="button" onclick="addToCart()">Add to Cart</button>
            </div>
          </div>
        </div>
      </section>
    `;
    startGallerySlideshow(images.length ? images : [FALLBACK_IMAGE]);
  }

  // Dummy reviews data
  const dummyReviews = [
    { name: "Priya Sharma", date: "June 5, 2024", rating: 5, title: "Amazing Quality!", text: "This product exceeded my expectations. The quality is top-notch and it arrived very quickly. Highly recommend to everyone!" },
    { name: "Rahul Kumar", date: "May 28, 2024", rating: 4, title: "Good Value for Money", text: "Pretty good product for the price. It does what it says. One star less because delivery was a bit slow." },
    { name: "Anjali Singh", date: "May 15, 2024", rating: 5, title: "Perfect!", text: "Absolutely love it! Fits perfectly and looks great. Will definitely buy again from Hoppokart." },
    { name: "Vikram Yadav", date: "April 30, 2024", rating: 3, title: "Average Product", text: "It's okay, nothing special. Works as intended but I expected a bit more for the price. Packaging was good though." },
  ];

  function generateStars(rating) {
    let starsHtml = '';
    for (let i = 1; i <= 5; i++) {
      starsHtml += `<svg width="1em" height="1em" viewBox="0 0 24 24" fill="${i <= rating ? 'currentColor' : 'none'}" stroke="${i <= rating ? 'none' : 'currentColor'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;
    }
    return starsHtml;
  }

  function renderReviews(reviews, overallRating, reviewCount) {
    if (overallRatingValueEl) overallRatingValueEl.textContent = overallRating.toFixed(1);
    if (overallRatingStarsEl) overallRatingStarsEl.innerHTML = generateStars(Math.round(overallRating));
    if (overallReviewCountEl) overallReviewCountEl.textContent = `(${reviewCount} Reviews)`;

    const reviewListEl = document.getElementById('reviewList');
    if (!reviewListEl) return;

    if (!reviews.length) {
      reviewListEl.innerHTML = '<div class="empty">No reviews yet. Be the first to review!</div>';
      return;
    }

    reviewListEl.innerHTML = reviews.map(review => `
      <div class="review-card">
        <div class="review-header">
          <div class="reviewer-info">
            <span class="reviewer-name">${escapeHtml(review.name)}</span>
            <span class="review-date">${review.date}</span>
          </div>
          <div class="stars">${generateStars(review.rating)}</div>
        </div>
        <h4 class="review-title">${escapeHtml(review.title)}</h4>
        <p class="review-text">${escapeHtml(review.text)}</p>
      </div>
    `).join('');
  }

  // Toggle review form
  const writeReviewBtn = document.getElementById('writeReviewBtn');
  const reviewFormEl = document.getElementById('reviewForm');
  if (writeReviewBtn && reviewFormEl) {
    writeReviewBtn.addEventListener('click', () => {
      reviewFormEl.classList.toggle('hidden');
      if (!reviewFormEl.classList.contains('hidden')) {
        reviewFormEl.scrollIntoView({ behavior: 'smooth' });
      }
    });
  }

  const submitReviewForm = document.getElementById('submitReviewForm');
  if (submitReviewForm) {
    submitReviewForm.addEventListener('submit', (e) => {
      e.preventDefault();
      alert('Review submitted! (This is a dummy submission)');
      submitReviewForm.reset();
      reviewFormEl.classList.add('hidden');
    });
  }

  function startGallerySlideshow(images) {
    const mainImage = document.getElementById('mainProductImage');
    const thumbs = Array.from(document.querySelectorAll('.gallery-thumb'));
    if (!mainImage || !images.length) return;

    let currentIndex = 0;
    const applyImage = (nextIndex) => {
      currentIndex = nextIndex;
      mainImage.style.opacity = '0.35';
      setTimeout(() => {
        mainImage.src = images[currentIndex];
        mainImage.style.opacity = '1';
      }, 140);
      thumbs.forEach((thumb, index) => thumb.classList.toggle('active', index === currentIndex));
    };

    thumbs.forEach((thumb, index) => {
      thumb.addEventListener('click', () => applyImage(index));
    });

    if (images.length > 1) {
      setInterval(() => {
        applyImage((currentIndex + 1) % images.length);
      }, 2400);
    }
  }

  function getCartItems() {
    return JSON.parse(localStorage.getItem('cart_items') || '[]');
  }

  function setCartItems(items) {
    localStorage.setItem('cart_items', JSON.stringify(items));
    updateCartUI();
  }

  function updateCartUI() {
    const cart = getCartItems();
    const count = cart.reduce((sum, item) => sum + (Number(item.quantity) || 1), 0);
    const floatingCart = document.getElementById('floatingCart');
    const floatingBadge = document.getElementById('floatingBadge');
    if (floatingCart && floatingBadge) {
      if (count > 0) {
        floatingCart.classList.add('show');
        floatingBadge.textContent = count;
      } else {
        floatingCart.classList.remove('show');
      }
    }
  }

  function addToCart() {
    if (!activeProduct) return;
    const qtyInput = document.getElementById('buyQty');
    const quantity = Math.max(1, Number(qtyInput?.value || 1));
    const cart = getCartItems();
    const existing = cart.find(item => item.id === String(activeProduct._id || ''));
    if (existing) {
      existing.quantity = (Number(existing.quantity) || 1) + quantity;
    } else {
      cart.push({
        id: String(activeProduct._id || ''),
        name: String(activeProduct.name || 'Product'),
        image: String(activeProduct.img1 || FALLBACK_IMAGE),
        price: Number(String(activeProduct.price || '0').replace(/[^0-9.]/g, '')) || 0,
        quantity
      });
    }
    setCartItems(cart);
    const toast = document.createElement('div');
    toast.className = 'added-card show';
    toast.innerHTML = `
      <div class="added-card-content">
        <img src="${activeProduct.img1 || FALLBACK_IMAGE}" alt="${escapeHtml(activeProduct.name)}">
        <div class="added-card-info">
          <p class="added-card-title">${escapeHtml(activeProduct.name)}</p>
          <p class="added-card-status">Added to Cart!</p>
        </div>
      </div>
      <a href="/checkout.html?cart=1" class="btn btn-primary" style="width: 100%; min-height: 40px; font-size: 0.9rem;">Checkout Now</a>
    `;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2800);
  }

  function buyNow(productId) {
    const qtyInput = document.getElementById('buyQty');
    const quantity = Math.max(1, Number(qtyInput?.value || 1));
    const params = new URLSearchParams({ id: productId, qty: String(quantity) });
    window.location.href = `/checkout.html?${params.toString()}`;
  }

  function changeQty(delta) {
    const qtyInput = document.getElementById('buyQty');
    if (!qtyInput) return;
    const current = Math.max(1, Number(qtyInput.value || 1));
    qtyInput.value = String(Math.max(1, current + delta));
  }

  let currentLightboxImageIndex = 0;

  function getProductImages(product) {
    return [product.img1, product.img2, product.img3, product.img4].map((value) => String(value || '').trim()).filter(Boolean);
  }

  function openLightbox(index) {
    const images = getProductImages(activeProduct);
    if (images.length === 0) return;

    currentLightboxImageIndex = index;
    showImageInLightbox(currentLightboxImageIndex);
    lightboxOverlay.classList.add('show');
    document.body.style.overflow = 'hidden';

    lightboxThumbsContainer.innerHTML = images.map((img, idx) => `
      <button class="gallery-thumb ${idx === currentLightboxImageIndex ? 'active' : ''}" type="button" data-lightbox-image-index="${idx}">
        <img src="${img}" alt="Thumbnail ${idx + 1}" onerror="this.src='${FALLBACK_IMAGE}'">
      </button>
    `).join('');

    lightboxThumbsContainer.querySelectorAll('.gallery-thumb').forEach(thumb => {
      thumb.addEventListener('click', (e) => {
        const idx = parseInt(e.currentTarget.dataset.lightboxImageIndex);
        showImageInLightbox(idx);
      });
    });
  }

  function closeLightbox() {
    lightboxOverlay.classList.remove('show');
    document.body.style.overflow = '';
  }

  function showImageInLightbox(index) {
    const images = getProductImages(activeProduct);
    if (index < 0) index = images.length - 1;
    if (index >= images.length) index = 0;
    currentLightboxImageIndex = index;
    lightboxImage.src = images[currentLightboxImageIndex];

    lightboxThumbsContainer.querySelectorAll('.gallery-thumb').forEach((thumb, idx) => {
      thumb.classList.toggle('active', idx === currentLightboxImageIndex);
    });
  }

  document.getElementById('productMount').addEventListener('click', (e) => {
    if (e.target.id === 'mainProductImage' || e.target.closest('.gallery-thumb')) {
      const index = e.target.closest('.gallery-thumb') ? Array.from(e.target.closest('.gallery-thumbs').children).indexOf(e.target.closest('.gallery-thumb')) : 0;
      openLightbox(index);
    }
  });
  document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
  lightboxPrev.addEventListener('click', () => showImageInLightbox(currentLightboxImageIndex - 1));
  lightboxNext.addEventListener('click', () => showImageInLightbox(currentLightboxImageIndex + 1));
  lightboxOverlay.addEventListener('click', (e) => {
    if (e.target === lightboxOverlay) closeLightbox();
  });
  document.addEventListener('keydown', (e) => {
    if (lightboxOverlay.classList.contains('show')) {
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') showImageInLightbox(currentLightboxImageIndex - 1);
      if (e.key === 'ArrowRight') showImageInLightbox(currentLightboxImageIndex + 1);
    }
  });

  function renderRelated(products, currentId) {
    const related = products.filter((item) => String(item._id || '') !== String(currentId || '')).slice(0, 8);
    if (!related.length) {
      relatedGrid.innerHTML = '<div class="empty">More products not available.</div>';
      return;
    }
    relatedGrid.innerHTML = related.map((product) => {
      const id = encodeURIComponent(product._id || '');
      const image = product.img1 || FALLBACK_IMAGE;
      const name = escapeHtml(product.name || 'Untitled product');
      const price = formatInr(product.price);
      return `
        <article class="related-card">
          <a href="/product.html?id=${id}">
            <img src="${image}" alt="${name}" onerror="this.src='${FALLBACK_IMAGE}'">
          </a>
          <div class="related-body">
            <div class="related-title">${name}</div>
            <span class="related-price">${price}</span>
            <a class="btn btn-primary" href="/product.html?id=${id}">View Product</a>
          </div>
        </article>
      `;
    }).join('');
  }

  async function init() {
    try {
      const products = await getProducts();
      let product = products.find((item) => String(item._id || '') === String(productId || ''));

      if (!product && productId) {
        const singleRes = await fetch(apiUrl(`/api/product/${productId}`)).catch(() => null);
        if (singleRes && singleRes.ok) {
          const singleData = await singleRes.json();
          if (singleData.success) product = singleData.product;
        }
      }

      if (!product) product = products[0];

      if (!product) {
        productMount.innerHTML = '<div class="empty">Product not found.</div>';
        relatedGrid.innerHTML = '';
        return;
      }
      activeProduct = product;
      renderProduct(product);
      renderRelated(products, product._id);

      const totalRating = dummyReviews.reduce((sum, r) => sum + r.rating, 0);
      const avgRating = dummyReviews.length > 0 ? totalRating / dummyReviews.length : 0;
      renderReviews(dummyReviews, avgRating, dummyReviews.length);
      updateCartUI();
    } catch (_error) {
      productMount.innerHTML = '<div class="empty">Product load nahi ho paya. Please refresh the page.</div>';
      relatedGrid.innerHTML = '';
    }
  }

  init();
</script>
</body>
</html>
